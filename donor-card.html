<!DOCTYPE html>
<html lang="en" class="antialiased scroll-smooth">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Donor Card - Blood Donation Community</title>
    <link rel="shortcut icon" href="image/blood-drop.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/common.css">
    <meta name="description" content="View and download your digital donor card - Blood Donation Community.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Page loader */
        #page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        #page-loader.fade-out { opacity: 0; visibility: hidden; transition: opacity .5s, visibility .5s; }
        body.loading > *:not(#page-loader):not(script) { opacity: 0 !important; visibility: hidden !important; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fef2f2 0%, #fff 30%, #fef2f2 70%, #fff 100%);
            min-height: 100vh;
        }

        .page-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(220,38,38,0.08);
            position: sticky; top: 0; z-index: 50;
        }

        /* ═══════════════════════════════════════════
           DONOR CARD — Reference-matching design
           ═══════════════════════════════════════════ */
        .dc-card-outer {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            aspect-ratio: 3/4.5;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(185,28,28,0.18), 0 0 0 1px rgba(220,38,38,0.06);
            position: relative;
            background: #fff;
        }

        .dc-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Geometric background shapes */
        .dc-geo-bg {
            position: absolute; inset: 0; overflow: hidden; pointer-events: none;
        }
        .dc-geo-bg .diamond-center {
            position: absolute;
            width: 60%;
            height: 60%;
            top: 15%;
            left: 20%;
            background: linear-gradient(135deg, rgba(220,38,38,0.07), rgba(239,68,68,0.04));
            transform: rotate(45deg);
            border-radius: 8px;
        }
        .dc-geo-bg .tri-tl {
            position: absolute; top: 0; left: 0;
            width: 0; height: 0;
            border-left: 100px solid rgba(220,38,38,0.12);
            border-bottom: 100px solid transparent;
        }
        .dc-geo-bg .tri-tr {
            position: absolute; top: 0; right: 0;
            width: 0; height: 0;
            border-right: 80px solid rgba(220,38,38,0.08);
            border-bottom: 80px solid transparent;
        }
        .dc-geo-bg .tri-bl {
            position: absolute; bottom: 0; left: 0;
            width: 0; height: 0;
            border-left: 70px solid rgba(220,38,38,0.06);
            border-top: 70px solid transparent;
        }
        .dc-geo-bg .tri-br {
            position: absolute; bottom: 0; right: 0;
            width: 0; height: 0;
            border-right: 90px solid rgba(220,38,38,0.1);
            border-top: 90px solid transparent;
        }
        .dc-geo-bg .stripe-l {
            position: absolute; top: 30%; left: -5%;
            width: 35%; height: 6px;
            background: linear-gradient(90deg, rgba(220,38,38,0.12), transparent);
            transform: rotate(-25deg);
        }
        .dc-geo-bg .stripe-r {
            position: absolute; top: 25%; right: -5%;
            width: 35%; height: 6px;
            background: linear-gradient(-90deg, rgba(220,38,38,0.12), transparent);
            transform: rotate(25deg);
        }
        .dc-geo-bg .stripe-l2 {
            position: absolute; top: 33%; left: -5%;
            width: 30%; height: 4px;
            background: linear-gradient(90deg, rgba(249,115,22,0.1), transparent);
            transform: rotate(-25deg);
        }
        .dc-geo-bg .stripe-r2 {
            position: absolute; top: 28%; right: -5%;
            width: 30%; height: 4px;
            background: linear-gradient(-90deg, rgba(249,115,22,0.1), transparent);
            transform: rotate(25deg);
        }

        /* Blood drops */
        .dc-blood-drop {
            position: absolute;
            width: 18px; height: 26px;
            pointer-events: none;
        }
        .dc-blood-drop::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 70%, #dc2626, #991b1b);
            clip-path: path('M9 0 C9 0 18 13 18 18 C18 22.4 14 26 9 26 C4 26 0 22.4 0 18 C0 13 9 0 9 0 Z');
            opacity: 0.6;
        }
        .dc-blood-drop.drop-1 { top: 8%; left: 12%; transform: scale(1.1) rotate(-10deg); }
        .dc-blood-drop.drop-2 { top: 15%; right: 10%; transform: scale(0.8) rotate(12deg); }
        .dc-blood-drop.drop-3 { bottom: 22%; left: 6%; transform: scale(0.9) rotate(-5deg); }
        .dc-blood-drop.drop-4 { bottom: 18%; right: 8%; transform: scale(1) rotate(8deg); }
        .dc-blood-drop.drop-5 { top: 50%; left: 4%; transform: scale(0.7) rotate(-15deg); }
        .dc-blood-drop.drop-6 { top: 45%; right: 5%; transform: scale(0.65) rotate(10deg); }

        /* Header area */
        .dc-header {
            position: relative; z-index: 2;
            text-align: center;
            padding: 20px 16px 12px;
        }
        .dc-header .dc-logo {
            width: 42px; height: 42px;
            margin: 0 auto 6px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(220,38,38,0.25);
        }
        .dc-header .dc-logo img {
            width: 26px; height: 26px;
            filter: brightness(10);
        }
        .dc-header .dc-org-name {
            font-size: 0.55rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(185,28,28,0.7);
            font-weight: 700;
        }
        .dc-header .dc-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #b91c1c;
            letter-spacing: 0.06em;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(185,28,28,0.1);
        }

        /* Photo ring */
        .dc-photo-section {
            position: relative; z-index: 3;
            display: flex; justify-content: center;
            margin-top: 4px;
        }
        .dc-photo-ring {
            width: 200px; height: 200px;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(135deg, #dc2626, #b91c1c, #991b1b);
            box-shadow: 0 12px 40px rgba(220,38,38,0.3), 0 0 0 6px rgba(220,38,38,0.08), 0 0 0 12px rgba(220,38,38,0.04);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .dc-photo-ring:hover {
            transform: scale(1.03);
            box-shadow: 0 16px 50px rgba(220,38,38,0.35), 0 0 0 6px rgba(220,38,38,0.12), 0 0 0 12px rgba(220,38,38,0.06);
        }
        .dc-photo-inner {
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #fecaca, #fef2f2);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            border: 4px solid #fff;
        }
        .dc-photo-inner .dc-initials {
            font-family: 'Poppins', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #b91c1c;
            user-select: none;
        }
        .dc-photo-inner img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Name ribbon banner */
        .dc-name-section {
            position: relative; z-index: 3;
            text-align: center;
            margin-top: 14px;
            padding: 0 10px;
        }
        .dc-ribbon {
            display: inline-block;
            position: relative;
            background: linear-gradient(135deg, #f59e0b, #d97706, #b45309);
            color: #fff;
            padding: 8px 40px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            min-width: 65%;
            box-shadow: 0 6px 24px rgba(217,119,6,0.3);
        }
        .dc-ribbon::before,
        .dc-ribbon::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 28px;
        }
        .dc-ribbon::before {
            left: -20px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            clip-path: polygon(100% 0, 100% 100%, 0 50%);
        }
        .dc-ribbon::after {
            right: -20px;
            background: linear-gradient(135deg, #d97706, #b45309);
            clip-path: polygon(0 0, 0 100%, 100% 50%);
        }

        /* Blood group badge below ribbon */
        .dc-blood-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            padding: 6px 28px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 30px;
            letter-spacing: 0.04em;
            box-shadow: 0 4px 18px rgba(220,38,38,0.3);
        }

        /* Info area */
        .dc-info-area {
            position: relative; z-index: 3;
            padding: 8px 24px 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 6px;
        }
        .dc-info-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(254,242,242,0.7);
            border: 1px solid rgba(220,38,38,0.08);
            font-size: 0.72rem;
            color: #374151;
            font-weight: 600;
        }
        .dc-info-chip i {
            color: #dc2626;
            font-size: 0.65rem;
        }

        /* Footer */
        .dc-footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 4;
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 50%, #ef4444 100%);
            padding: 10px 16px;
            text-align: center;
        }
        .dc-footer-logo {
            width: 28px; height: 28px; margin: 0 auto 4px;
        }
        .dc-footer-logo img {
            width: 100%; height: 100%;
            filter: brightness(10);
        }
        .dc-footer-text {
            font-family: 'Poppins', sans-serif;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #fff;
        }

        /* Controls */
        .dc-controls {
            max-width: 420px;
            margin: 20px auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .dc-upload-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 24px;
            border-radius: 12px;
            border: 2px dashed rgba(220,38,38,0.3);
            background: rgba(254,242,242,0.6);
            color: #dc2626;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }
        .dc-upload-btn:hover {
            border-color: #dc2626;
            background: #fef2f2;
            transform: translateY(-1px);
        }
        .dc-download-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 28px;
            border-radius: 12px;
            border: none;
            background: #d1d5db;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: not-allowed;
            opacity: 0.7;
            transition: all 0.25s;
        }
        .dc-download-btn.active {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            cursor: pointer;
            opacity: 1;
            box-shadow: 0 4px 16px rgba(20,184,166,0.25);
        }
        .dc-download-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(20,184,166,0.3);
        }
        .dc-hint {
            font-size: 0.78rem;
            color: #dc2626;
            font-weight: 600;
            text-align: center;
        }
        .dc-hint.success { color: #059669; }

        @media (max-width: 480px) {
            .dc-card-outer { border-radius: 14px; }
            .dc-photo-ring { width: 160px; height: 160px; padding: 6px; }
            .dc-photo-inner .dc-initials { font-size: 2.8rem; }
            .dc-ribbon { font-size: 0.95rem; padding: 7px 30px; }
            .dc-blood-badge { font-size: 1.1rem; }
            .dc-header .dc-title { font-size: 1.2rem; }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { firebaseConfig } from "./assets/js/modules/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const loader = document.getElementById('page-loader');

        function hideLoader() {
            if (loader) {
                loader.classList.add('fade-out');
                document.body.classList.remove('loading');
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }
        }

        function esc(v) {
            const t = v == null || v === '' ? '—' : String(v);
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDate(dateStr) {
            if (!dateStr) return null;
            const d = new Date(dateStr + 'T00:00:00');
            const p = n => String(n).padStart(2, '0');
            return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()}`;
        }

        function populateCard(donorData) {
            const name = donorData.fullName || 'Donor';
            const initials = name.split(/\s+/).filter(Boolean).map(p => p[0]).join('').slice(0,2).toUpperCase();

            document.getElementById('dc-initials').textContent = initials;
            document.getElementById('dc-name').textContent = name.toUpperCase();
            document.getElementById('dc-blood').textContent = donorData.bloodGroup || '—';
            document.getElementById('dc-location').textContent = donorData.location || '—';
            document.getElementById('dc-phone').textContent = donorData.phone || '—';

            // Last donation
            const lastD = donorData.lastDonateDate ? formatDate(donorData.lastDonateDate) : 'Not recorded';
            document.getElementById('dc-last-donate').textContent = lastD;

            // Next eligible
            let nextEligible = '—';
            if (donorData.lastDonateDate) {
                const last = new Date(donorData.lastDonateDate + 'T00:00:00');
                const nextDate = new Date(last.getTime() + 90 * 24 * 60 * 60 * 1000);
                nextEligible = nextDate <= new Date() ? 'Eligible Now' : formatDate(donorData.lastDonateDate.split('T')[0]);
                if (nextDate > new Date()) {
                    const p = n => String(n).padStart(2,'0');
                    nextEligible = `${p(nextDate.getDate())}/${p(nextDate.getMonth()+1)}/${nextDate.getFullYear()}`;
                }
            }
            document.getElementById('dc-next-eligible').textContent = nextEligible;
        }

        /* ══════════════════════════════════════════════════
           Canvas rendering for download (matching design)
           ══════════════════════════════════════════════════ */
        function renderDonorCardCanvas(donorData, photoSrc) {
            return new Promise(resolve => {
                const SCALE = 3;
                const W = 420, H = 630;
                const canvas = document.createElement('canvas');
                canvas.width = W * SCALE; canvas.height = H * SCALE;
                const ctx = canvas.getContext('2d');
                ctx.scale(SCALE, SCALE);

                // ── White background ──
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, W, H);

                // ── Geometric decorations ──
                // Center diamond
                ctx.save();
                ctx.translate(W/2, H * 0.4);
                ctx.rotate(Math.PI/4);
                ctx.fillStyle = 'rgba(220,38,38,0.05)';
                ctx.fillRect(-130, -130, 260, 260);
                ctx.restore();

                // Corner triangles
                ctx.fillStyle = 'rgba(220,38,38,0.1)';
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(100,0); ctx.lineTo(0,100); ctx.fill();
                ctx.fillStyle = 'rgba(220,38,38,0.07)';
                ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W-80,0); ctx.lineTo(W,80); ctx.fill();
                ctx.fillStyle = 'rgba(220,38,38,0.05)';
                ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(70,H); ctx.lineTo(0,H-70); ctx.fill();
                ctx.fillStyle = 'rgba(220,38,38,0.08)';
                ctx.beginPath(); ctx.moveTo(W,H); ctx.lineTo(W-90,H); ctx.lineTo(W,H-90); ctx.fill();

                // Diagonal stripes
                ctx.save();
                ctx.translate(0, H*0.32); ctx.rotate(-25 * Math.PI/180);
                ctx.fillStyle = 'rgba(220,38,38,0.08)';
                ctx.fillRect(-20, 0, W*0.35, 5);
                ctx.fillStyle = 'rgba(249,115,22,0.06)';
                ctx.fillRect(-20, 10, W*0.3, 3);
                ctx.restore();
                ctx.save();
                ctx.translate(W, H*0.28); ctx.rotate(25 * Math.PI/180);
                ctx.fillStyle = 'rgba(220,38,38,0.08)';
                ctx.fillRect(-W*0.35, 0, W*0.35, 5);
                ctx.fillStyle = 'rgba(249,115,22,0.06)';
                ctx.fillRect(-W*0.3, 10, W*0.3, 3);
                ctx.restore();

                // ── Blood drops ──
                const drawBloodDrop = (x, y, scale, rot) => {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(rot * Math.PI/180);
                    ctx.scale(scale, scale);
                    ctx.fillStyle = 'rgba(220,38,38,0.5)';
                    ctx.beginPath();
                    ctx.moveTo(0, -10);
                    ctx.bezierCurveTo(-2, -6, -7, 0, -7, 4);
                    ctx.bezierCurveTo(-7, 8, -4, 10, 0, 10);
                    ctx.bezierCurveTo(4, 10, 7, 8, 7, 4);
                    ctx.bezierCurveTo(7, 0, 2, -6, 0, -10);
                    ctx.fill();
                    ctx.restore();
                };
                drawBloodDrop(50, 60, 1.2, -10);
                drawBloodDrop(W-45, 95, 0.9, 12);
                drawBloodDrop(30, H*0.55, 0.8, -5);
                drawBloodDrop(W-35, H*0.48, 0.7, 8);
                drawBloodDrop(55, H*0.72, 0.6, -12);
                drawBloodDrop(W-50, H*0.68, 0.65, 10);

                // ── Header ──
                // Logo circle
                const logoR = 18;
                const logoCX = W/2, logoCY = 32;
                const logoGrad = ctx.createLinearGradient(logoCX-logoR, logoCY-logoR, logoCX+logoR, logoCY+logoR);
                logoGrad.addColorStop(0, '#dc2626'); logoGrad.addColorStop(1, '#b91c1c');
                ctx.fillStyle = logoGrad;
                ctx.beginPath(); ctx.arc(logoCX, logoCY, logoR, 0, Math.PI*2); ctx.fill();
                // "+" cross in logo
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(logoCX-8, logoCY); ctx.lineTo(logoCX+8, logoCY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(logoCX, logoCY-8); ctx.lineTo(logoCX, logoCY+8); ctx.stroke();

                // Org name
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(185,28,28,0.6)'; ctx.font = '700 8px Arial';
                ctx.letterSpacing = '2px';
                ctx.fillText('BLOOD DONATION COMMUNITY', W/2, 60);
                // Title
                ctx.fillStyle = '#b91c1c'; ctx.font = '900 22px Arial';
                ctx.fillText('DONOR CARD', W/2, 82);

                // ── Photo ──
                const photoS = 180;
                const photoCX = W/2, photoCY = 185;
                const photoR = photoS/2;

                // Outer red ring
                ctx.lineWidth = 9;
                const ringGrad = ctx.createLinearGradient(photoCX-photoR, photoCY-photoR, photoCX+photoR, photoCY+photoR);
                ringGrad.addColorStop(0, '#dc2626'); ringGrad.addColorStop(0.5, '#b91c1c'); ringGrad.addColorStop(1, '#991b1b');
                ctx.strokeStyle = ringGrad;
                ctx.beginPath(); ctx.arc(photoCX, photoCY, photoR+8, 0, Math.PI*2); ctx.stroke();

                // Additional decorative rings
                ctx.strokeStyle = 'rgba(220,38,38,0.08)'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(photoCX, photoCY, photoR+16, 0, Math.PI*2); ctx.stroke();
                ctx.strokeStyle = 'rgba(220,38,38,0.04)'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(photoCX, photoCY, photoR+22, 0, Math.PI*2); ctx.stroke();

                // White circle background
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(photoCX, photoCY, photoR+3, 0, Math.PI*2); ctx.fill();

                // Photo circle clip background
                ctx.save();
                ctx.beginPath(); ctx.arc(photoCX, photoCY, photoR, 0, Math.PI*2); ctx.clip();
                const bgGrad = ctx.createLinearGradient(photoCX-photoR, photoCY-photoR, photoCX+photoR, photoCY+photoR);
                bgGrad.addColorStop(0, '#fecaca'); bgGrad.addColorStop(1, '#fef2f2');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(photoCX-photoR, photoCY-photoR, photoS, photoS);
                ctx.restore();

                // ── Computed values ──
                let nextEligible = '--';
                if (donorData.lastDonateDate) {
                    const last = new Date(donorData.lastDonateDate + 'T00:00:00');
                    const nextDate = new Date(last.getTime() + 90*24*60*60*1000);
                    if (nextDate <= new Date()) { nextEligible = 'Eligible Now'; }
                    else { const p = n => String(n).padStart(2,'0'); nextEligible = `${p(nextDate.getDate())}/${p(nextDate.getMonth()+1)}/${nextDate.getFullYear()}`; }
                }
                const lastD = donorData.lastDonateDate
                    ? (() => { const d = new Date(donorData.lastDonateDate+'T00:00:00'); const p = n => String(n).padStart(2,'0'); return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()}`; })()
                    : 'Not recorded';

                const drawRest = () => {
                    const nameText = (donorData.fullName || 'DONOR').toUpperCase();

                    // ── Name ribbon ──
                    const ribbonY = photoCY + photoR + 28;
                    const ribbonH = 36;
                    const ribbonW = Math.min(W * 0.72, 310);
                    const ribbonX = (W - ribbonW) / 2;
                    const ribbonEndW = 22;

                    // Main ribbon body
                    const ribGrad = ctx.createLinearGradient(ribbonX, ribbonY, ribbonX+ribbonW, ribbonY);
                    ribGrad.addColorStop(0, '#f59e0b'); ribGrad.addColorStop(0.5, '#d97706'); ribGrad.addColorStop(1, '#b45309');
                    ctx.fillStyle = ribGrad;
                    ctx.fillRect(ribbonX, ribbonY, ribbonW, ribbonH);

                    // Left ribbon end
                    ctx.fillStyle = '#f59e0b';
                    ctx.beginPath();
                    ctx.moveTo(ribbonX - ribbonEndW, ribbonY);
                    ctx.lineTo(ribbonX, ribbonY);
                    ctx.lineTo(ribbonX, ribbonY + ribbonH);
                    ctx.lineTo(ribbonX - ribbonEndW, ribbonY + ribbonH);
                    ctx.lineTo(ribbonX - ribbonEndW + 10, ribbonY + ribbonH/2);
                    ctx.fill();

                    // Right ribbon end
                    ctx.fillStyle = '#b45309';
                    ctx.beginPath();
                    ctx.moveTo(ribbonX + ribbonW + ribbonEndW, ribbonY);
                    ctx.lineTo(ribbonX + ribbonW, ribbonY);
                    ctx.lineTo(ribbonX + ribbonW, ribbonY + ribbonH);
                    ctx.lineTo(ribbonX + ribbonW + ribbonEndW, ribbonY + ribbonH);
                    ctx.lineTo(ribbonX + ribbonW + ribbonEndW - 10, ribbonY + ribbonH/2);
                    ctx.fill();

                    // Ribbon shadow folds
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    ctx.beginPath();
                    ctx.moveTo(ribbonX, ribbonY); ctx.lineTo(ribbonX-4, ribbonY-4); ctx.lineTo(ribbonX-ribbonEndW, ribbonY); ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(ribbonX+ribbonW, ribbonY); ctx.lineTo(ribbonX+ribbonW+4, ribbonY-4); ctx.lineTo(ribbonX+ribbonW+ribbonEndW, ribbonY); ctx.fill();

                    // Name text on ribbon
                    ctx.fillStyle = '#fff'; ctx.font = '800 17px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(nameText, W/2, ribbonY + ribbonH/2 + 6);

                    // ── Blood group badge ──
                    const badgeY = ribbonY + ribbonH + 14;
                    const badgeW = 90, badgeH = 34;
                    const badgeX = (W - badgeW) / 2;
                    const bGrad = ctx.createLinearGradient(badgeX, badgeY, badgeX+badgeW, badgeY+badgeH);
                    bGrad.addColorStop(0, '#dc2626'); bGrad.addColorStop(1, '#b91c1c');
                    ctx.fillStyle = bGrad;
                    ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 17); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '900 20px Arial';
                    ctx.fillText(donorData.bloodGroup || '--', W/2, badgeY + badgeH/2 + 7);

                    // ── Info chips ──
                    const chipY = badgeY + badgeH + 14;
                    const chipH = 26;
                    const chipGap = 6;
                    const chipPad = 12;

                    const drawChip = (text, x, y, w) => {
                        ctx.fillStyle = 'rgba(254,242,242,0.6)';
                        ctx.beginPath(); ctx.roundRect(x, y, w, chipH, chipH/2); ctx.fill();
                        ctx.strokeStyle = 'rgba(220,38,38,0.08)'; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.roundRect(x, y, w, chipH, chipH/2); ctx.stroke();
                        // Dot
                        ctx.fillStyle = '#dc2626';
                        ctx.beginPath(); ctx.arc(x + 12, y + chipH/2, 3, 0, Math.PI*2); ctx.fill();
                        // Text
                        ctx.fillStyle = '#374151'; ctx.font = '600 10px Arial'; ctx.textAlign = 'left';
                        ctx.fillText(text, x + 20, y + chipH/2 + 4);
                    };

                    // Compute chip widths
                    ctx.font = '600 10px Arial';
                    const chips = [
                        donorData.location || '--',
                        donorData.phone || '--',
                        lastD,
                        nextEligible
                    ];
                    const chipWidths = chips.map(t => ctx.measureText(t).width + 36);

                    // Row 1: location + phone
                    const row1W = chipWidths[0] + chipGap + chipWidths[1];
                    let cx = (W - row1W) / 2;
                    drawChip(chips[0], cx, chipY, chipWidths[0]);
                    cx += chipWidths[0] + chipGap;
                    drawChip(chips[1], cx, chipY, chipWidths[1]);

                    // Row 2: last donate + next eligible
                    const row2W = chipWidths[2] + chipGap + chipWidths[3];
                    cx = (W - row2W) / 2;
                    drawChip(chips[2], cx, chipY + chipH + chipGap, chipWidths[2]);
                    cx += chipWidths[2] + chipGap;
                    drawChip(chips[3], cx, chipY + chipH + chipGap, chipWidths[3]);

                    // ── Footer band ──
                    const footH = 44;
                    const footY = H - footH;
                    const fGrad = ctx.createLinearGradient(0, footY, W, footY);
                    fGrad.addColorStop(0, '#b91c1c'); fGrad.addColorStop(0.5, '#dc2626'); fGrad.addColorStop(1, '#ef4444');
                    ctx.fillStyle = fGrad;
                    ctx.fillRect(0, footY, W, footH);

                    // "+" in a small circle
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath(); ctx.arc(W/2, footY + 14, 8, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(W/2 - 4, footY + 14); ctx.lineTo(W/2 + 4, footY + 14); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(W/2, footY + 10); ctx.lineTo(W/2, footY + 18); ctx.stroke();

                    // Footer text
                    ctx.fillStyle = '#fff'; ctx.font = '800 10px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('DONATE BLOOD SAVE LIFE', W/2, footY + 34);

                    // ── Border ──
                    ctx.strokeStyle = 'rgba(220,38,38,0.08)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(1,1,W-2,H-2,14); ctx.stroke();

                    ctx.textAlign = 'left';
                    resolve(canvas);
                };

                // ── Load photo ──
                if (photoSrc) {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        ctx.save();
                        ctx.beginPath(); ctx.arc(photoCX, photoCY, photoR, 0, Math.PI*2); ctx.clip();
                        ctx.drawImage(img, photoCX-photoR, photoCY-photoR, photoS, photoS);
                        ctx.restore();
                        drawRest();
                    };
                    img.onerror = () => {
                        const init = (donorData.fullName||'D').split(/\s+/).filter(Boolean).map(p=>p[0]).join('').slice(0,2).toUpperCase();
                        ctx.fillStyle = '#b91c1c'; ctx.font = '900 56px Arial'; ctx.textAlign = 'center';
                        ctx.fillText(init, photoCX, photoCY + 20); ctx.textAlign = 'left';
                        drawRest();
                    };
                    img.src = photoSrc;
                } else {
                    const init = (donorData.fullName||'D').split(/\s+/).filter(Boolean).map(p=>p[0]).join('').slice(0,2).toUpperCase();
                    ctx.fillStyle = '#b91c1c'; ctx.font = '900 56px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(init, photoCX, photoCY + 20); ctx.textAlign = 'left';
                    drawRest();
                }
            });
        }

        /* ══════════════════════════════════════════════════
           Firebase Auth + Data + Wiring
           ══════════════════════════════════════════════════ */
        let currentDonorData = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                hideLoader();
                document.getElementById('not-logged-in')?.classList.remove('hidden');
                return;
            }

            const userRef = ref(database, `donors/${user.uid}`);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val() || {};
                hideLoader();
                document.getElementById('card-section')?.classList.remove('hidden');

                currentDonorData = { ...data, email: user.email, uid: user.uid };
                populateCard(currentDonorData);
            }, { onlyOnce: true });
        });

        // Photo upload
        const photoInput = document.getElementById('dc-photo-input');
        const photoRing = document.getElementById('dc-photo-ring');
        const photoImg = document.getElementById('dc-photo-img');
        const initialsEl = document.getElementById('dc-initials');
        const uploadText = document.getElementById('dc-upload-text');
        const downloadBtn = document.getElementById('dc-download-btn');
        const hint = document.getElementById('dc-hint');

        photoRing?.addEventListener('click', () => photoInput?.click());

        photoInput?.addEventListener('change', (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                photoImg.src = ev.target.result;
                photoImg.style.display = 'block';
                initialsEl.style.display = 'none';
                uploadText.textContent = 'Change Photo';

                downloadBtn.disabled = false;
                downloadBtn.classList.add('active');
                hint.className = 'dc-hint success';
                hint.innerHTML = '<i class="fa-solid fa-circle-check" style="margin-right:3px"></i>Photo uploaded! You can now download your card.';
            };
            reader.readAsDataURL(file);
        });

        // Download
        downloadBtn?.addEventListener('click', () => {
            if (!photoImg?.src || photoImg.style.display === 'none') {
                hint.className = 'dc-hint';
                hint.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="margin-right:3px"></i>Photo is required! Please upload your photo first.';
                return;
            }
            if (!currentDonorData) return;

            renderDonorCardCanvas(currentDonorData, photoImg.src).then(canvas => {
                const link = document.createElement('a');
                link.download = `Donor_Card_${(currentDonorData.fullName || 'card').replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>

</html>
